<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advance School of Business — Course Reference</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Roboto', sans-serif; background: #F6F6F4; color: #2D2D2D; font-size: 14px; }

header { background: #2D2D2D; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 3px solid #7A1219; }
.header-logo { color: white; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; font-style: italic; }
.header-logo span { font-weight: 400; }
.header-sub { color: #9B9B99; font-size: 12px; margin-top: 3px; }

nav { display: flex; background: #1a1a1a; padding: 0 32px; }
nav button { background: none; border: none; color: #9B9B99; font-size: 14px; font-family: inherit; font-weight: 500; padding: 14px 20px; cursor: pointer; border-bottom: 3px solid transparent; }
nav button:hover { color: white; }
nav button.active { color: white; border-bottom-color: #7A1219; }

.page { display: none; padding: 28px 32px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

.course-hero { background: #2D2D2D; color: white; border-radius: 8px; padding: 24px 28px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
.course-hero h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.course-hero p { font-size: 13px; color: #B0AFA8; line-height: 1.6; }
.course-meta { text-align: right; flex-shrink: 0; }
.badge { background: #7A1219; color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
.course-meta p { font-size: 12px; color: #9B9B99; }

.week-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.week-tab { background: white; border: 1px solid #E8E8E8; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: #5F5E5A; font-family: inherit; }
.week-tab:hover { border-color: #7A1219; color: #7A1219; }
.week-tab.active { background: #7A1219; border-color: #7A1219; color: white; }

.week-content { display: none; }
.week-content.active { display: block; }
.week-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: #2D2D2D; }

.card { background: white; border: 1px solid #E8E8E8; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.card-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
.card-header:hover { background: #F6F6F4; }
.card-title { font-size: 14px; font-weight: 700; }
.card-right { display: flex; align-items: center; gap: 10px; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
.tag-out { background: #E8E8E8; color: #5F5E5A; }
.tag-read { background: #FBEAEA; color: #7A1219; }
.tag-disc { background: #E1F5EE; color: #0F6E56; }
.tag-asgn { background: #E6F1FB; color: #185FA5; }
.tag-pod { background: #F0E8F8; color: #6B2FA0; }
.chev { font-size: 11px; color: #9B9B99; transition: transform 0.18s; }
.chev.open { transform: rotate(180deg); }

.card-body { display: none; padding: 0 18px 18px; border-top: 1px solid #F0F0F0; }
.card-body.open { display: block; }

/* Outcomes */
.out-list { list-style: none; padding: 14px 0 0; }
.out-list li { padding: 5px 0; line-height: 1.6; border-bottom: 1px solid #F6F6F4; display: flex; align-items: flex-start; gap: 8px; }
.out-list li:last-child { border-bottom: none; }
.out-list li::before { content: ""; display: block; width: 6px; height: 6px; border-radius: 50%; background: #7A1219; margin-top: 7px; flex-shrink: 0; }
.out-code { font-size: 11px; color: #7A1219; font-weight: 700; white-space: nowrap; }

/* Readings */
.read-list { padding: 14px 0 0; }
.read-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #F6F6F4; }
.read-item:last-child { border-bottom: none; }
.read-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.rb-ch { background: #E8E8E8; color: #5F5E5A; }
.rb-vid { background: #FBEAEA; color: #7A1219; }
.read-item a { color: #185FA5; text-decoration: none; line-height: 1.5; }
.read-item a:hover { text-decoration: underline; }

/* Discussion */
.disc-list { padding: 14px 0 0; counter-reset: dq; }
.disc-item { counter-increment: dq; display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #F6F6F4; line-height: 1.6; }
.disc-item:last-child { border-bottom: none; }
.disc-item::before { content: counter(dq); font-weight: 700; color: #7A1219; min-width: 18px; flex-shrink: 0; }

/* Assignment */
.asgn-block { padding: 14px 0 0; }
.asgn-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.meta-pill { background: #F6F6F4; border: 1px solid #E8E8E8; border-radius: 4px; padding: 3px 10px; font-size: 12px; }
.meta-pill strong { color: #7A1219; }
.asgn-overview { line-height: 1.7; margin-bottom: 14px; color: #2D2D2D; }
.note-box { background: #F6F6F4; border-left: 3px solid #7A1219; padding: 8px 12px; font-size: 13px; line-height: 1.6; margin: 10px 0; color: #5F5E5A; }
.sub-head { font-size: 12px; font-weight: 700; color: #7A1219; text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }
.inst-list { counter-reset: inst; }
.inst-list li { counter-increment: inst; display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #F6F6F4; line-height: 1.6; list-style: none; }
.inst-list li:last-child { border-bottom: none; }
.inst-list li::before { content: counter(inst); background: #7A1219; color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }

/* Rubric */
.rubric-wrap { overflow-x: auto; margin-top: 10px; }
.rubric { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
.rubric th { background: #2D2D2D; color: white; padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 700; white-space: nowrap; }
.rubric td { padding: 7px 10px; border-bottom: 1px solid #F0F0F0; vertical-align: top; line-height: 1.5; }
.rubric tr:nth-child(even) td { background: #FAFAFA; }
.rubric tr:last-child td { border-bottom: none; }
.rubric td:first-child { font-weight: 700; color: #2D2D2D; min-width: 120px; }
.rubric td:nth-child(2) { color: #7A1219; font-weight: 700; min-width: 80px; }
.divider { border-top: 1px solid #E8E8E8; margin: 16px 0; }

@media (max-width: 680px) {
  .page { padding: 16px; }
  .header-top { padding: 12px 16px; }
  nav { padding: 0 16px; }
  .course-hero { flex-direction: column; }
  .course-meta { text-align: left; }
}
</style>
</head>

function chLink(url, label) {
  return `<a href="${url}" target="_blank">${label}</a>`;
}

function showCourse(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function toggle(el) {
  const body = el.nextElementSibling;
  const chev = el.querySelector('.chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function showWeek(courseId, n) {
  document.querySelectorAll('#'+courseId+' .week-content').forEach(w => w.classList.remove('active'));
  document.querySelectorAll('#'+courseId+' .week-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(courseId+'-w'+n).classList.add('active');
  document.getElementById(courseId+'-t'+n).classList.add('active');
}

function card(tag, tagClass, title, bodyHtml) {
  return `<div class="card">
    <div class="card-header" onclick="toggle(this)">
      <span class="card-title">${title}</span>
      <span class="card-right"><span class="tag ${tagClass}">${tag}</span><span class="chev">&#9660;</span></span>
    </div>
    <div class="card-body">${bodyHtml}</div>
  </div>`;
}

function outcomes(list) {
  return '<ul class="out-list">'+list.map(o=>`<li><span>${o}</span></li>`).join('')+'</ul>';
}

function readings(list) {
  return '<div class="read-list">'+list.map(r=>`<div class="read-item"><span class="read-badge ${r.vid?'rb-vid':'rb-ch'}">${r.vid?'Watch':'Chapter'}</span><span>${r.link?`<a href="${r.link}" target="_blank">${r.label}</a>`:r.label}</span></div>`).join('')+'</div>';
}

function discussion(list) {
  return '<div class="disc-list">'+list.map(q=>`<div class="disc-item"><span>${q}</span></div>`).join('')+'</div>';
}

function rubric(headers, rows) {
  if(!headers||!headers.length) return '';
  const ths = headers.map(h=>`<th>${h}</th>`).join('');
  const trs = rows.map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('');
  return `<div class="sub-head">Grading Rubric</div><div class="rubric-wrap"><table class="rubric"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function assignment(a, extra) {
  let inst = a.instructions&&a.instructions.length ? `<div class="sub-head">Instructions</div><ol class="inst-list">${a.instructions.map(i=>`<li><span>${i}</span></li>`).join('')}</ol>` : '';
  let note = a.note ? `<div class="note-box">${a.note}</div>` : '';
  let rub = rubric(a.rh, a.rr);
  let ext = extra||'';
  return `<div class="asgn-block">
    <div class="asgn-meta"><div class="meta-pill"><strong>Points:</strong> ${a.pts}</div><div class="meta-pill"><strong>Length:</strong> ${a.len}</div></div>
    <div class="asgn-overview">${a.overview}</div>
    ${note}${inst}${rub}${ext}
  </div>`;
}

function buildCourse(courseId, data, heroTitle, heroDesc, credits, weeks, extra6) {
  const el = document.getElementById(courseId);
  let html = `<div class="course-hero">
    <div><h1>${heroTitle}</h1><p>${heroDesc}</p></div>
    <div class="course-meta"><div class="badge">${credits}</div><p>${weeks} Weeks</p></div>
  </div>
  <div class="week-tabs" id="${courseId}-tabs"></div>
  <div id="${courseId}-weeks"></div>`;
  el.innerHTML = html;

  const tabsEl = document.getElementById(courseId+'-tabs');
  const weeksEl = document.getElementById(courseId+'-weeks');

  data.forEach((wk, i) => {
    const n = i+1;

    // Tab
    const tab = document.createElement('button');
    tab.className = 'week-tab'+(n===1?' active':'');
    tab.id = courseId+'-t'+n;
    tab.textContent = 'Week '+n;
    tab.onclick = () => showWeek(courseId, n);
    tabsEl.appendChild(tab);

    // Week container
    const wDiv = document.createElement('div');
    wDiv.className = 'week-content'+(n===1?' active':'');
    wDiv.id = courseId+'-w'+n;

    // Extra for week 6 BUS-300
    let extraHtml = '';
    if (extra6 && n===6) {
      extraHtml = `<div class="divider"></div>
        ${card('Assignment','tag-asgn', extra6.title, assignment(extra6))}`;
    }

    wDiv.innerHTML = `<div class="week-title">${wk.title}</div>
      ${podcastCard(courseId, n)}
      ${card('Outcomes','tag-out','Learning Outcomes', outcomes(wk.outcomes))}
      ${card('Readings','tag-read','Readings & Videos', readings(wk.readings))}
      ${card('Discussion','tag-disc','Discussion Questions', discussion(wk.discussion))}
      ${card('Assignment','tag-asgn', wk.assignment.title, assignment(wk.assignment))}
      ${extraHtml}`;

    weeksEl.appendChild(wDiv);
  });
}
